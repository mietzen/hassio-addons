name: psmqtt
version: 0.3.0
slug: psmqtt
description: Publishes host system metrics to MQTT using psmqtt.
url: https://github.com/mietzen/hassio-addons/tree/main/psmqtt
arch:
- aarch64
- amd64
startup: application
boot: auto
host_network: true
full_access: true
map:
- config:rw
privileged:
- SYS_RAWIO
image: mietzen/hass-addon-psmqtt
init: false
options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_clientid: psmqtt
  mqtt_publish_topic_prefix: ""
  mqtt_ha_discovery_device_name: ""
  smart_devices: []
  smart_short_test_schedule: "0 3 * * 0"
  smart_long_test_schedule: "0 4 1 * *"
  logging_level: INFO
  schedule_yaml: |
    - cron: "every 5 minutes"
      tasks:
        - task: cpu_percent
          topic: "psmqtt/{hostname}/cpu/percent"
          ha_discovery:
            name: "CPU Usage"
            icon: "mdi:cpu-64-bit"
            unit_of_measurement: "%"
            state_class: "measurement"
        - task: virtual_memory
          params: [percent]
          topic: "psmqtt/{hostname}/memory/percent"
          ha_discovery:
            name: "Memory Usage"
            icon: "mdi:memory"
            unit_of_measurement: "%"
            state_class: "measurement"
        - task: disk_usage
          params: ["/config", percent]
          topic: "psmqtt/{hostname}/disk/percent"
          ha_discovery:
            name: "Disk Usage"
            icon: "mdi:harddisk"
            unit_of_measurement: "%"
            state_class: "measurement"
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
  mqtt_clientid: str?
  mqtt_publish_topic_prefix: str?
  mqtt_ha_discovery_device_name: str?
  smart_devices:
  - str
  smart_short_test_schedule: str?
  smart_long_test_schedule: str?
  logging_level: "list(DEBUG|INFO|WARNING|ERROR)?"
  schedule_yaml: str
