name: linux2mqtt
version: 0.1.0
slug: linux2mqtt
description: Publishes Home Assistant host system metrics to MQTT.
url: https://github.com/mietzen/hassio-addons/tree/main/linux2mqtt
arch:
- aarch64
- amd64
startup: application
boot: auto
host_network: true
full_access: true
map:
- config:rw
privileged:
- SYS_RAWIO
- SYS_ADMIN
image: mietzen/hass-addon-linux2mqtt
init: false
options:
  mqtt_host: core-mosquitto
  mqtt_user: ""
  mqtt_password: ""
  smart_short_test_schedule: "0 3 * * 0"
  smart_long_test_schedule: "0 4 1 * *"
  log_verbosity: 4
schema:
  mqtt_host: str
  mqtt_user: str?
  mqtt_password: password?
  smart_short_test_schedule: str?
  smart_long_test_schedule: str?
  log_verbosity: list(1|2|3|4|5)
