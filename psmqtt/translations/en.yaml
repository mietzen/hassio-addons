configuration:
  mqtt_host:
    name: MQTT Broker Host
    description: The hostname or IP address of your MQTT broker.
  mqtt_port:
    name: MQTT Broker Port
    description: The port number of your MQTT broker (default 1883).
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication (leave empty if not required).
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication (leave empty if not required).
  mqtt_clientid:
    name: MQTT Client ID
    description: The MQTT client ID used by psmqtt.
  mqtt_qos:
    name: MQTT QoS
    description: MQTT Quality of Service level (0, 1, or 2).
  mqtt_retain:
    name: MQTT Retain
    description: Whether to set the retain flag on published MQTT messages.
  mqtt_clean_session:
    name: MQTT Clean Session
    description: Whether to use a clean MQTT session on each connection.
  mqtt_reconnect_period_sec:
    name: MQTT Reconnect Period
    description: Seconds to wait before reconnecting to the MQTT broker after a disconnect.
  mqtt_publish_topic_prefix:
    name: MQTT Topic Prefix
    description: Optional prefix prepended to all MQTT topics.
  mqtt_ha_discovery_enabled:
    name: HA Discovery Enabled
    description: Enable Home Assistant MQTT auto-discovery for psmqtt sensors.
  mqtt_ha_discovery_topic:
    name: HA Discovery Topic
    description: The MQTT topic prefix used for Home Assistant discovery (default "homeassistant").
  mqtt_ha_discovery_device_name:
    name: HA Discovery Device Name
    description: Custom device name for Home Assistant discovery. Leave empty to use the hostname.
  logging_level:
    name: Log Level
    description: The logging verbosity level for psmqtt.
  schedule_yaml:
    name: Schedule Configuration (YAML)
    description: >-
      The full psmqtt schedule configuration in YAML format. This defines which
      system metrics to collect, how often, and which MQTT topics to publish to.
      See the psmqtt documentation for available tasks and options.
